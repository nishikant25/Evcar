<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GreenDrive Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚡ GreenDrive Hub</h1>
  <p>Smart EV Calculator & Tracker</p>
</header>

<section class="hero">
  <h2>Drive Electric. Save Future.</h2>
  <button onclick="scrollToCalc()">Start Now</button>
</section>

<section id="calc" class="grid">

  <div class="card">
    <h2>🌱 Calculator</h2>

    <input id="distance" placeholder="Distance (km)">
    <input id="petrol" placeholder="Petrol price (₹)">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
  </div>

  <div class="card">
    <h2>📊 Stats</h2>
    <p>Total Carbon Saved:</p>
    <h3 id="total">0 kg</h3>
  </div>

  <div class="card">
    <h2>🕒 History</h2>
    <ul id="history"></ul>
  </div>

</section>

<footer>
  <p>⚡ Built by Nishi</p>
</footer>

<script src="script.js"></script>
</body>
</html>
