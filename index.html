<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electric Drive Hub</title>
 <link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<!-- Navbar -->
<header>
  <h1>⚡ Electric Drive Hub</h1>
</header>

<!-- Hero -->
<section class="hero">
  <h2>Compare Electric Cars Easily</h2>
  <p>Find the best EV based on price, range & performance</p>
</section>
  <section class="section">
  <h2>⚔️ EV vs Petrol/Diesel</h2>
  <table>
    <tr>
      <th>Feature</th>
      <th>Electric</th>
      <th>Petrol/Diesel</th>
    </tr>
    <tr>
      <td>Fuel Cost</td>
      <td>Very Low ⚡</td>
      <td>High ⛽</td>
    </tr>
    <tr>
      <td>Maintenance</td>
      <td>Low</td>
      <td>High</td>
    </tr>
    <tr>
      <td>Pollution</td>
      <td>Zero Emission 🌱</td>
      <td>High Pollution</td>
    </tr>
  </table>
</section>

<!-- Cars -->
<section id="carList" class="grid"></section>

<!-- Compare -->
<div class="center">
  <button onclick="compareCars()">Compare Selected</button>
</div>

<!-- Result -->
<section id="result"></section>

<script src="script.js"></script>

</body>
</html>
