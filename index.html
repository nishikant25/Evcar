<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GreenDrive Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>⚡ GreenDrive Hub</h1>
  <p>Drive Smart. Save Earth.</p>
</header>

<section class="hero">
  <h2>Switch to Electric Vehicles</h2>
  <p>Reduce pollution & save money</p>
</section>

<section class="calculator">
  <h2>🌱 Carbon Footprint Calculator</h2>
  
  <input type="number" id="distance" placeholder="Distance (km)">
  <input type="number" id="petrol" placeholder="Petrol cost per liter (₹)">
  
  <button onclick="calculate()">Calculate</button>
  
  <div id="result"></div>
</section>

<section class="comparison">
  <h2>⚡ EV vs Petrol</h2>
  <table>
    <tr>
      <th>Factor</th>
      <th>EV</th>
      <th>Petrol</th>
    </tr>
    <tr>
      <td>Cost/km</td>
      <td>₹1-2</td>
      <td>₹6-10</td>
    </tr>
    <tr>
      <td>Pollution</td>
      <td>Zero</td>
      <td>High</td>
    </tr>
    <tr>
      <td>Maintenance</td>
      <td>Low</td>
      <td>High</td>
    </tr>
  </table>
</section>

<footer>
  <p>Made by Nishi 🚀</p>
</footer>

<script src="script.js"></script>
</body>
</html>
