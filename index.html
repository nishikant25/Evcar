<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV World Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h1>EV World ⚡</h1>
  <div>
    <a href="#">Home</a>
    <a href="#cars">Cars</a>
    <a href="#compare">Compare</a>
  </div>
</nav>

<section class="hero">
  <h2>Drive the Future 🚗⚡</h2>
  <p>Compare, Analyze & Save with Electric Vehicles</p>
  <button onclick="scrollToCars()">Explore</button>
</section>

<section id="cars" class="container">
  <div class="card">
    <h3>Tata Nexon EV</h3>
    <p>Range: 465 km</p>
    <p>Price: ₹15L</p>
  </div>

  <div class="card">
    <h3>MG ZS EV</h3>
    <p>Range: 461 km</p>
    <p>Price: ₹18L</p>
  </div>

  <div class="card">
    <h3>BYD Atto 3</h3>
    <p>Range: 521 km</p>
    <p>Price: ₹33L</p>
  </div>
</section>

<section id="compare" class="compare">
  <h2>Compare EVs ⚖️</h2>

  <select id="car1">
    <option value="15">Nexon EV</option>
    <option value="18">MG ZS EV</option>
    <option value="33">BYD Atto 3</option>
  </select>

  <select id="car2">
    <option value="15">Nexon EV</option>
    <option value="18">MG ZS EV</option>
    <option value="33">BYD Atto 3</option>
  </select>

  <button onclick="compareCars()">Compare</button>
  <p id="compareResult"></p>
</section>

<section class="calculator">
  <h2>Daily Savings 💰</h2>
  <input type="number" id="km" placeholder="KM per day">
  <button onclick="calculate()">Calculate</button>
  <p id="result"></p>
</section>

<footer>
  <p>© 2026 EV World Pro | Nishikant ⚡</p>
</footer>

<script src="script.js"></script>
</body>
</html>
